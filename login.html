<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Barbearia do Ze</title>
    <link rel="icon" type="imagem/png" href="img/Barbearia_Logo.png"> <!--favicon-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> <!--icons-->
    <link rel="stylesheet" href="estilizacoes/login.css">

</head>

<body>
    <main class="container">
        <form>
            
            <img src="img/Barbearia_Logo.png" alt="logo" class="logo-login">

            
            <h1>Login</h1>

            <div class="input-box">
                <input placeholder="Usuario" type="email">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <!--LEMBRAR A SENHA E ESQUECI A SENHA-->
            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar a senha
                </label>
                <a href="">Esqueci a senha</a>
            </div>

            <!--CADASTRE-SE E SOU FUNCIONARIO-->
            <button type="submit" class="login">Entrar</button>

            <div class="register-link">
                <p>Nao tem uma conta? <a href="">Cadastre-se</a></p>
            </div>

            <div class="funcionario">
                <a href="funcionario.html">Sou funcionario</a>


        </form>
    </main>
    
</body>
</html>
